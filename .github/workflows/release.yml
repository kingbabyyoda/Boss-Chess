name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyinstaller

      - name: Run tests
        shell: bash
        run: pytest -q

      - name: Build standalone executable
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --name BossChess main.py

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: boss-chess-${{ matrix.os }}
          path: |
            dist/BossChess*
